<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
body { font-family: sans-serif; }
h1 { font-size: 18pt; }
table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #ccc; padding: 6px; font-size: 10pt; }
</style>
</head>
<body>
<h1>Ringkasan Proyeksi PAD {{ year }}</h1>
<p>Skenario: {{ scenario }}</p>
<table>
<thead><tr><th>Periode</th><th>Jenis Pajak</th><th>Nilai</th></tr></thead>
<tbody>
{% for r in rows %}
<tr><td>{{ r.periode }}</td><td>{{ r.jenis_pajak }}</td><td>{{ '{:,.0f}'.format(r.nilai) }}</td></tr>
{% endfor %}
</tbody>
</table>
</body>
</html>
